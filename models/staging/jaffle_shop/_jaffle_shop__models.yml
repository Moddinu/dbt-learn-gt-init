models:
 - name: stg_jaffle_shop__customers
   description: One record per customer
   columns:
     - name: customer_id
       description: Integer identified of customer from source table
       data_tests:
         - unique
         - not_null
     - name: first_name
       description: Full first name of customer
     - name: last_name
       description: First initial abbreviation of customer's last name or surname
        

 - name: stg_jaffle_shop__orders
   description: One record per order
   columns:
     - name: order_id
       data_tests:
         - unique
         - not_null
     - name: customer_id
       data_tests:
         - relationships:
             arguments:
               to: ref('stg_jaffle_shop__customers')
               field: customer_id
     - name: order_status
       description: "{{ doc('order_status') }}"
       data_tests:
         - accepted_values:
             arguments:
               values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
     - name: order_date
       description: Date order was placed in YYYY-MM-DD format

     - name: _etl_loaded_at
       description: Timestamp of when recorded was added to source table in ISO 8601 timestamp format
